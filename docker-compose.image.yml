services:
  export-xml-web:
    image: ghcr.io/${IMAGE_OWNER:-REPLACE_WITH_GITHUB_OWNER}/export-xml-web:${IMAGE_TAG:-latest}
    container_name: export-xml-web
    ports:
      - "18080:8080"
    environment:
      API_KEY: "${API_KEY:-CHANGE_ME_TO_A_LONG_RANDOM_SECRET}"
    restart: unless-stopped
